<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Blocked</title>
    <style>
        @keyframes gradientShift {
            0% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            25% { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); }
            50% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            75% { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); }
            100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        body {
            font-family: Arial, sans-serif;
            animation: gradientShift 8s ease-in-out infinite;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }
        
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        
        .circle1 {
            width: 60px;
            height: 60px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .circle2 {
            width: 40px;
            height: 40px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }
        
        .circle3 {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }
        
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s ease-in-out infinite;
        }
        
        .sparkle1 { top: 15%; left: 80%; animation-delay: 0s; }
        .sparkle2 { top: 70%; left: 5%; animation-delay: 1s; }
        .sparkle3 { top: 40%; right: 10%; animation-delay: 2s; }
        .sparkle4 { bottom: 30%; left: 70%; animation-delay: 1.5s; }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            animation: breathe 4s ease-in-out infinite;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 3s ease-in-out infinite;
            display: inline-block;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
            animation-delay: 0.2s;
            animation-fill-mode: both;
        }
        
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out;
            animation-delay: 0.4s;
            animation-fill-mode: both;
        }
        
        .motivational {
            font-style: italic;
            font-size: 1.1em;
            opacity: 0.8;
            animation: fadeInUp 1s ease-out;
            animation-delay: 0.6s;
            animation-fill-mode: both;
            position: relative;
        }
        
        .zen-message {
            margin-top: 30px;
            font-size: 1em;
            opacity: 0.7;
            animation: fadeInUp 1s ease-out;
            animation-delay: 0.8s;
            animation-fill-mode: both;
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-circle circle1"></div>
        <div class="floating-circle circle2"></div>
        <div class="floating-circle circle3"></div>
        <div class="sparkle sparkle1"></div>
        <div class="sparkle sparkle2"></div>
        <div class="sparkle sparkle3"></div>
        <div class="sparkle sparkle4"></div>
    </div>
    
    <div class="container">
        <div class="icon">🧘‍♂️</div>
        <h1>YouTube is Blocked</h1>
        <p>YouTube has been gently blocked to help you find your focus and inner peace.</p>
        <p class="motivational">"The best time to plant a tree was 20 years ago. The second best time is now."</p>
        <p class="zen-message">✨ Use this moment to reconnect with yourself ✨</p>
    </div>
</body>
</html>
