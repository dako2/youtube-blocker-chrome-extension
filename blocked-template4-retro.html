<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Blocked</title>
    <style>
        @keyframes neonGlow {
            0%, 100% { 
                text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff;
                box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            }
            50% { 
                text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            }
        }
        
        @keyframes scanline {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        
        @keyframes typewriter {
            0% { width: 0; }
            100% { width: 100%; }
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(45deg, #0a0a0a 0%, #1a0a1a 50%, #0a1a1a 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #00ff00;
            position: relative;
            overflow: hidden;
        }
        
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: scanline 3s linear infinite;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #ff00ff;
            border-radius: 0;
            animation: neonGlow 2s ease-in-out infinite alternate;
            max-width: 600px;
            position: relative;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff0080;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #ff0080;
            text-transform: uppercase;
            letter-spacing: 3px;
            overflow: hidden;
            white-space: nowrap;
            animation: typewriter 2s steps(20) 1s both;
        }
        
        .subtitle {
            font-size: 1em;
            color: #00ff00;
            margin-bottom: 30px;
            line-height: 1.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .motivational {
            color: #00ffff;
            font-size: 0.9em;
            border-top: 1px solid #ff00ff;
            padding-top: 20px;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>YouTube is Blocked</h1>
        <p class="subtitle">Access Denied - Focus Mode Activated</p>
        <p class="motivational">"The best time to plant a tree was 20 years ago. The second best time is now."</p>
    </div>
</body>
</html>
