<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Blocked</title>
    <style>
        @keyframes leafFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-15px) rotate(5deg); }
            66% { transform: translateY(-5px) rotate(-3deg); }
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes fadeInNature {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 50%, #ffd3a5 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2d5016;
            position: relative;
        }
        
        .leaf {
            position: absolute;
            font-size: 24px;
            animation: leafFloat 4s ease-in-out infinite;
        }
        
        .leaf1 { top: 20%; left: 15%; animation-delay: 0s; }
        .leaf2 { top: 70%; right: 20%; animation-delay: 1.5s; }
        .leaf3 { bottom: 30%; left: 25%; animation-delay: 3s; }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeInNature 1.2s ease-out, breathe 4s ease-in-out infinite;
            max-width: 500px;
            border: 2px solid rgba(45, 80, 22, 0.1);
        }
        
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.3em;
            margin-bottom: 20px;
            color: #c0392b;
            font-weight: normal;
        }
        
        .subtitle {
            font-size: 1.1em;
            color: #27ae60;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .motivational {
            font-style: italic;
            color: #16a085;
            font-size: 1em;
            border-top: 2px solid rgba(45, 80, 22, 0.2);
            padding-top: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="leaf leaf1">🍃</div>
    <div class="leaf leaf2">🌿</div>
    <div class="leaf leaf3">🍃</div>
    
    <div class="container">
        <div class="icon">🌱</div>
        <h1>YouTube is Blocked</h1>
        <p class="subtitle">Take a moment to reconnect with nature and your inner peace.</p>
        <p class="motivational">"The best time to plant a tree was 20 years ago. The second best time is now."</p>
    </div>
</body>
</html>
