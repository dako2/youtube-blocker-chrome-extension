<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Blocked</title>
    <style>
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.8s ease-out;
            max-width: 500px;
        }
        
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        h1 {
            font-size: 2.2em;
            margin-bottom: 16px;
            color: #e74c3c;
            font-weight: 600;
        }
        
        .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .motivational {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1em;
            border-top: 1px solid #eee;
            padding-top: 24px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚫</div>
        <h1>YouTube is Blocked</h1>
        <p class="subtitle">This website has been blocked to help you stay focused and productive.</p>
        <p class="motivational">"The best time to plant a tree was 20 years ago. The second best time is now."</p>
    </div>
</body>
</html>
